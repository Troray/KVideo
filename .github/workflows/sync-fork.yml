name: Sync Fork
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时，与你原计划一致
  workflow_dispatch:  # 支持手动触发
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 输出中文日志 - 开始同步
        run: echo "开始同步本地仓库与上游仓库..."

      - name: Sync Upstream
        uses: aormsby/fork-sync-with-upstream-action@v3.4
        with:
          upstream_sync_repo: KuekHaoYang/KVideo
          upstream_sync_branch: main
          target_sync_branch: main
          upstream_repo_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: 输出中文日志 - 检查更新
        run: echo "检查上游仓库是否有更新..."

      - name: 输出中文日志 - 同步完成
        run: echo "同步完成。如果有新更新，已同步到本地仓库。"

      - name: 推送消息到 Telegram
        run: |
          MESSAGE="GitHub Action 同步操作完成。\n如果上游仓库有更新，已同步到本地仓库。"
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=${MESSAGE}" \
          -d "parse_mode=HTML"
