name: Sync upstream KVideo and notify

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/KuekHaoYang/KVideo.git || true
          git fetch upstream

      - name: Check upstream changes
        id: check
        run: |
          COUNT=$(git rev-list --count origin/main..upstream/main)
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Exit if no changes
        if: steps.check.outputs.count == '0'
        run: |
          echo "✅ 上游无更新，workflow 结束"
          exit 0

      - name: Collect upstream commit log
        id: log
        run: |
          LOG=$(git log origin/main..upstream/main \
            --pretty=format:"- %s (%an)")
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fast-forward merge
        run: |
          git merge upstream/main --ff-only

      - name: Push changes
        run: |
          git push origin main

      - name: Notify Telegram
        env:
          COMMIT_COUNT: ${{ steps.check.outputs.count }}
          COMMIT_LOG: ${{ steps.log.outputs.log }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MESSAGE="🚀 KVideo 同步完成

上游检测到 ${COMMIT_COUNT} 条新提交：

${COMMIT_LOG}

📦 已成功同步到本仓库"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="$MESSAGE"
