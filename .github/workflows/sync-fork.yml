name: Sync Fork (Smart & Low Cost)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # ========= Phase 1：极速判断 upstream 是否变化 =========
      - name: 检查 upstream 是否有新提交
        id: upstream_check
        run: |
          set -e

          UPSTREAM_REPO="KuekHaoYang/KVideo"
          BRANCH="main"

          UPSTREAM_SHA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${UPSTREAM_REPO}/commits/${BRANCH} \
            | jq -r '.sha')

          LOCAL_SHA=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/commits/${BRANCH} \
            | jq -r '.sha')

          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ========= Phase 2：真正同步 =========
      - name: Checkout repository
        if: steps.upstream_check.outputs.changed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git 提交身份
        if: steps.upstream_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加 upstream 并同步
        if: steps.upstream_check.outputs.changed == 'true'
        run: |
          set -e

          git remote add upstream https://github.com/KuekHaoYang/KVideo.git || true
          git fetch upstream

          git merge upstream/main --no-edit
          git push origin main

      # ========= Phase 3：通知 =========
      - name: 推送 Telegram 通知
        if: steps.upstream_check.outputs.changed == 'true'
        run: |
          MESSAGE='🚀KVideo仓库提醒\n检测到上游仓库有新提交，已成功同步到本仓库。'

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=${MESSAGE}"

      - name: 无需同步（日志）
        if: steps.upstream_check.outputs.changed == 'false'
        run: echo "✅ 上游无变化，流程结束"
