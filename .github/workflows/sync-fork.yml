name: Sync Fork

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动运行一次（可调整，如 '0 0 * * *' 每天凌晨）
  workflow_dispatch:  # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync with upstream
        uses: tgymnich/fork-sync@v2.0
        with:
          owner: 原仓库拥有者用户名  # 示例: tgymnich
          base: main  # 你的分支，通常是 main 或 master
          head: main  # 上游分支，通常相同
          token: ${{ secrets.SYNC_TOKEN }}  # 如果不需要可删掉这行
